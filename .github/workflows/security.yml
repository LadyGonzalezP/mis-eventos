name: Security Audit

# Audita vulnerabilidades en dependencias del backend (pip-audit) y
# frontend (npm audit). Corre:
# - Cada lunes a las 06:00 UTC
# - En cada PR que toca pyproject.toml, uv.lock, package.json, lockfile
# - Manualmente desde la pestana Actions

on:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    branches: [main]
    paths:
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-audit:
    name: Backend (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: uv tool install pip-audit

      - name: Sync deps
        working-directory: ./backend
        run: uv sync

      - name: Export requirements
        working-directory: ./backend
        run: uv export --no-emit-project --format requirements-txt > /tmp/requirements.txt

      - name: Run pip-audit (fails on known CVEs)
        run: uv tool run pip-audit --requirement /tmp/requirements.txt

  frontend-audit:
    name: Frontend (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --no-audit --no-fund

      - name: Run npm audit (fails on high or critical)
        working-directory: ./frontend
        run: npm audit --audit-level=high
